methodology_summary: >
  TrustRank ranks candidates by corroborated evidence, not keyword overlap.
  We read the one block that stays truthful in this dataset - the career-history
  descriptions - classify the work into a JD-aligned relevance rubric
  (ranking/recsys/retrieval > applied ML at product > light/mixed ML >
  data-eng/SWE > non-tech), then apply JD-explicit penalties (CV/speech-only,
  pure-services careers, "AI-curious but no professional ML") and an
  availability multiplier from behavioral signals. Impossible "honeypot"
  profiles are detected by internal date/skill contradictions and excluded.
  Pure-Python, CPU-only, no network - reproducible inside the 5-minute budget.
